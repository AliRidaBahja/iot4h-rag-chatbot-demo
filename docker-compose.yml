services:
  chroma:
    container_name: chroma-db
    build: ./chroma
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./chroma/data:/data
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8000"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 10s

  postgres:
    container_name: postgres-db
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-app:
    container_name: chat-app
    build: ./chat-app
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - chroma
      - postgres
    env_file:
      - .env

  streamlit-app:
    build: ./streamlit_app
    restart: always
    ports:
      - "8502:8501"
    depends_on:
      - chat-app
    environment:
      - CHAT_APP_URL=http://chat-app:8001

volumes:
  pg_data:
  chroma:
